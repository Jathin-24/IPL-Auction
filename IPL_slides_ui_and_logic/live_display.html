<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Auction Live Presentation</title>
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
        }

        .bebas {
            font-family: 'Bebas Neue', cursive;
        }

        #background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            z-index: 1;
        }

        /* Sold Overlay */
        .status-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            transform: scale(1.2);
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2) 0%, transparent 70%);
        }

        .status-overlay.active {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes gold-flash {
            0% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(2) contrast(1.2);
            }

            100% {
                filter: brightness(1);
            }
        }

        .sold-card {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(30px);
            border: 6px solid #FFD700;
            border-radius: 50px;
            padding: 5% 8%;
            text-align: center;
            box-shadow: 0 0 150px rgba(255, 215, 0, 0.5), inset 0 0 50px rgba(255, 215, 0, 0.2);
            animation: gold-flash 2s infinite ease-in-out;
            width: 90%;
            max-width: 800px;
        }

        @keyframes stamp {
            0% {
                transform: scale(3);
                opacity: 0;
                filter: blur(10px);
            }

            100% {
                transform: scale(1) rotate(-10deg);
                opacity: 1;
                filter: blur(0px);
            }
        }

        .unsold-text {
            font-size: clamp(4rem, 15vw, 12rem);
            color: #ff4d4d;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1rem;
            border: clamp(5px, 2vw, 15px) solid #ff4d4d;
            padding: 2vh 5vw;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            animation: stamp 0.3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gold-text {
            background: linear-gradient(to bottom, #FFD700 0%, #B8860B 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            }

            50% {
                box-shadow: 0 0 60px rgba(255, 215, 0, 0.8);
            }

            100% {
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            }
        }

        .pulse {
            animation: pulse-glow 2s infinite;
        }

        /* Navigation Help */
        .nav-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 5;
        }
    </style>
</head>

<body>

    <div id="background-container"></div>

    <!-- Sold Status -->
    <div id="sold-overlay" class="status-overlay">
        <div class="sold-card pulse">
            <h1 class="bebas text-6xl text-white tracking-widest mb-2 opacity-50">SOLD TO</h1>
            <h2 id="winning-team" class="bebas text-9xl gold-text mb-8">GUJARAT TITANS</h2>
            <div class="h-1 w-32 bg-yellow-500 mx-auto mb-8"></div>
            <h3 class="bebas text-5xl text-white tracking-widest mb-2 opacity-50">FINAL PRICE</h3>
            <p id="winning-price" class="bebas text-8xl text-white">₵ 550K</p>
        </div>
    </div>

    <!-- Unsold Status -->
    <div id="unsold-overlay" class="status-overlay">
        <h1 class="bebas unsold-text">UNSOLD</h1>
    </div>

    <div class="nav-hint">Click screen to advance</div>

    <script>
        let auctionData = { currentIndex: -2, players: [] }; // Initial state

        function updateDisplay() {
            const bg = document.getElementById('background-container');
            const soldOverlay = document.getElementById('sold-overlay');
            const unsoldOverlay = document.getElementById('unsold-overlay');

            let slideIndex = 1; // Default
            let player = null;

            if (auctionData) {
                const idx = auctionData.currentIndex;

                if (idx === -2) {
                    slideIndex = 1;
                } else if (idx === -1) {
                    slideIndex = 1; 
                } else if (idx >= 0 && auctionData.players) {
                    player = auctionData.players[idx];
                    if (player) {
                        // Re-adjusted mapping: idx 0 (First Player) = slide_2
                        // This assumes slide_1 is an intro slide.
                        slideIndex = idx + 2;
                    }
                }
            }

            // Update Background Image
            bg.style.backgroundImage = `url('slides/slide_${slideIndex}.jpg')`;

            // Update Overlay Status
            if (player) {
                if (player.status === 'sold') {
                    document.getElementById('winning-team').innerText = player.soldTo.toUpperCase();
                    document.getElementById('winning-price').innerText = `₵ ${player.soldPrice}`;
                    soldOverlay.classList.add('active');
                    unsoldOverlay.classList.remove('active');
                } else if (player.status === 'unsold') {
                    soldOverlay.classList.remove('active');
                    unsoldOverlay.classList.add('active');
                } else {
                    soldOverlay.classList.remove('active');
                    unsoldOverlay.classList.remove('active');
                }
            } else {
                soldOverlay.classList.remove('active');
                unsoldOverlay.classList.remove('active');
            }
        }

        // Click advances the MASTER state
        document.body.onclick = () => {
            if (auctionData) {
                // Command Admin dashboard to advance
                // Use a safe upper bound (1000 or actual players length)
                const maxIdx = auctionData.players ? auctionData.players.length - 1 : 100;
                if (auctionData.currentIndex < maxIdx) {
                    auctionData.currentIndex++;
                    localStorage.setItem('ipl_auction_data', JSON.stringify(auctionData));
                    updateDisplay();
                }
            }
        };

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight" || e.key === " ") {
                document.body.onclick();
            } else if (e.key === "ArrowLeft") {
                if (auctionData && auctionData.currentIndex > -2) {
                    auctionData.currentIndex--;
                    localStorage.setItem('ipl_auction_data', JSON.stringify(auctionData));
                    updateDisplay();
                }
            }
        });

        // Sync from Admin Dashboard
        window.addEventListener('storage', (e) => {
            if (e.key === 'ipl_auction_data' && e.newValue) {
                auctionData = JSON.parse(e.newValue);
                updateDisplay();
            }
        });

        // Initial Load - Simple load to preserve current state
        const saved = localStorage.getItem('ipl_auction_data');
        if (saved) {
            auctionData = JSON.parse(saved);
        } else {
            auctionData = { currentIndex: -2, players: [] };
        }

        updateDisplay();
    </script>
</body>

</html>
